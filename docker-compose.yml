services:
  
  backend:
    build: ./backend       
    container_name: brainbrush-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env     
    environment:
      - PORT=5000

  frontend:
    build: 
      context: ./frontend
      # 🚨 NEW: Passing the backend URL to Vite during the build!
      args:
        - VITE_BACKEND_URL=http://localhost:5000
    container_name: brainbrush-frontend
    restart: unless-stopped
    ports:
      - "80:80"            
    depends_on:
      - backend