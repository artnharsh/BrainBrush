services:
  redis:
    image: redis:7
    container_name: scribble-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend       
    container_name: scribble-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - redis
    env_file:
      - ./backend/.env     
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=5000

  frontend:
    build: 
      context: ./frontend
      # 🚨 NEW: Passing the backend URL to Vite during the build!
      args:
        - VITE_BACKEND_URL=http://localhost:5000
    container_name: scribble-frontend
    restart: unless-stopped
    ports:
      - "80:80"            
    depends_on:
      - backend

volumes:
  mongo_data:
  redis_data: